<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Accès refusé — OpenQuiz</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=IBM+Plex+Mono:wght@300;400;500;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg:        #080e14;
  --bg2:       #0d1620;
  --blue:      #3a7bd5;
  --blue-dim:  #2a5fa8;
  --blue-line: rgba(58,123,213,0.22);
  --red:       #e74c3c;
  --txt:       #e8edf2;
  --txt-dim:   rgba(232,237,242,0.45);
  --txt-faint: rgba(232,237,242,0.18);
  --mono:      'IBM Plex Mono', monospace;
  --serif:     'DM Serif Display', serif;
  --radius:    14px;
}

body {
  font-family: 'DM Sans', sans-serif;
  background: var(--bg); color: var(--txt);
  min-height: 100svh; display: flex; flex-direction: column;
}

body::before {
  content: '';
  position: fixed; inset: 0; z-index: 0; pointer-events: none;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
  background-size: 200px; opacity: 0.55;
}

nav {
  position: relative; z-index: 10;
  display: flex; align-items: center;
  padding: 0 5vw; height: 60px;
  border-bottom: 1px solid var(--blue-line);
}
.nav-logo { font-family: var(--mono); font-size: 14px; font-weight: 600; color: var(--txt); text-decoration: none; }
.nav-logo span { color: var(--blue); }

main {
  flex: 1; position: relative; z-index: 1;
  display: flex; align-items: center; justify-content: center;
  padding: 40px 24px;
}

.card {
  background: var(--bg2); border: 1px solid var(--blue-line);
  border-radius: 20px; padding: 52px 44px;
  max-width: 440px; width: 100%; text-align: center;
  animation: cardIn 0.5s ease;
}
@keyframes cardIn { from { opacity:0; transform:translateY(16px); } to { opacity:1; transform:translateY(0); } }

.card-icon {
  width: 56px; height: 56px; border-radius: 50%;
  margin: 0 auto 24px;
  display: flex; align-items: center; justify-content: center;
  font-size: 22px;
  background: rgba(231,76,60,0.1); border: 1px solid rgba(231,76,60,0.28);
}

.card-code {
  font-family: var(--mono); font-size: 11px; font-weight: 500;
  letter-spacing: 3px; text-transform: uppercase;
  color: var(--red); margin-bottom: 14px;
}

.card-title {
  font-family: var(--serif);
  font-size: clamp(24px, 3vw, 32px);
  color: var(--txt); margin-bottom: 14px;
}

.card-msg {
  font-family: var(--mono); font-size: 12px;
  line-height: 1.9; color: var(--txt-dim);
  margin-bottom: 32px;
}

.btn-login {
  font-family: var(--mono); font-size: 12px; font-weight: 500;
  letter-spacing: 1.5px; text-transform: uppercase;
  display: inline-block; padding: 14px 32px;
  background: var(--blue); color: #fff;
  border-radius: var(--radius); text-decoration: none;
  transition: background 0.2s, transform 0.15s;
  margin-right: 10px; margin-bottom: 10px;
}
.btn-login:hover { background: var(--blue-dim); transform: translateY(-1px); }

.btn-home {
  font-family: var(--mono); font-size: 12px; font-weight: 500;
  letter-spacing: 1.5px; text-transform: uppercase;
  display: inline-block; padding: 14px 32px;
  background: transparent; color: var(--txt-dim);
  border: 1px solid var(--blue-line);
  border-radius: var(--radius); text-decoration: none;
  transition: all 0.2s;
  margin-bottom: 10px;
}
.btn-home:hover { border-color: var(--blue); color: var(--txt); }
</style>
</head>
<body>

<nav>
  <a class="nav-logo" href="http://localhost/IMRANE_I01C_Projet_Quiz/src/acceuil.php"><span>//</span> OpenQuiz</a>
</nav>

<main>
  <div class="card">
    <div class="card-icon"></div>
    <div class="card-code">Accès refusé</div>
    <h1 class="card-title">Connexion requise</h1>
    <p class="card-msg">
      Vous devez être connecté pour accéder au quiz.<br>
      Connectez-vous ou créez un compte gratuitement.
    </p>
    <a class="btn-login" href="http://localhost/IMRANE_I01C_Projet_Quiz/src/login.php">Se connecter →</a>
    <a class="btn-home" href="http://localhost/IMRANE_I01C_Projet_Quiz/src/acceuil.php">Accueil</a>
  </div>
</main>

</body>
</html>
